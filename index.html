<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso · Red Ambiental (demo)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        /* Paleta extraída visualmente de https://www.redambiental.com/
           - Azul profundo: #0B2A4A (tono del encabezado/menú)
           - Verde fresco:   #4CAF50 (tono de acentos/botones)
           - Fondo claro:    #F4F7FA (gris muy suave, como el fondo general)
        */
        body {
            background-color: #F4F7FA;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
        }

        /* contenedor principal que alterna entre login y dashboard */
        .app-container {
            width: 100%;
            max-width: 1280px;
            background-color: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(11, 42, 74, 0.25);
            overflow: hidden;
            border: 1px solid rgba(11, 42, 74, 0.08);
        }

        /* sección de login (visible por defecto) */
        .login-section {
            padding: 3rem 2rem;
            background: linear-gradient(145deg, #FFFFFF 0%, #F9FCFE 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 600px;
        }

        .login-card {
            max-width: 440px;
            width: 100%;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 28px;
            box-shadow: 0 10px 25px -5px rgba(11, 42, 74, 0.1), 0 8px 10px -6px rgba(11, 42, 74, 0.05);
            border: 1px solid rgba(76, 175, 80, 0.15);
        }

        .login-card h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0B2A4A;
            margin-bottom: 0.5rem;
        }

        .login-card h1 span {
            color: #4CAF50;
            font-weight: 700;
        }

        .subhead {
            color: #5E6F8D;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border-left: 4px solid #4CAF50;
            padding-left: 1rem;
            background-color: #F0F7F0;
            border-radius: 0 8px 8px 0;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #0B2A4A;
            margin-bottom: 0.4rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            background-color: #F9FCFE;
            border: 2px solid #E2E8F0;
            border-radius: 20px;
            transition: all 0.2s ease;
            outline: none;
            color: #0B2A4A;
        }

        .input-group input:focus {
            border-color: #4CAF50;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.2);
        }

        .btn-login {
            background: #0B2A4A;
            color: white;
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 14px -8px rgba(11, 42, 74, 0.4);
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: #1A3F60;
            transform: scale(1.01);
            box-shadow: 0 12px 20px -10px #0B2A4A;
        }

        .btn-login:active {
            background: #072136;
            transform: scale(0.99);
        }

        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            padding: 0.8rem 1rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1rem;
            border: 1px solid #ffcdd2;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* dashboard protegido (oculto inicialmente) */
        .dashboard-section {
            display: none;
            background-color: white;
        }

        .dashboard-header {
            background: #0B2A4A;
            color: white;
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .dashboard-header h2 {
            font-weight: 500;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard-header h2 img {
            height: 32px;
            filter: brightness(0) invert(1);
        }

        .user-badge {
            background-color: #4CAF50;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-logout {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.15);
            border-color: white;
        }

        .iframe-container {
            padding: 2rem;
            display: flex;
            justify-content: center;
            background: #F4F7FA;
        }

        iframe {
            max-width: 100%;
            height: auto;
            aspect-ratio: 1024 / 804;
            border-radius: 24px;
            box-shadow: 0 20px 30px -10px rgba(11, 42, 74, 0.3);
            border: 4px solid white;
        }

        /* BANNER DE COOKIES */
        .cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 500px;
            margin: 0 auto;
            background: #0B2A4A;
            color: white;
            padding: 1rem 1.8rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            box-shadow: 0 15px 30px -10px #0B2A4A;
            z-index: 9999;
            border: 1px solid #4CAF50;
            font-size: 0.95rem;
            backdrop-filter: blur(2px);
        }

        .cookie-banner span {
            color: #F0F7F0;
        }

        .cookie-btn {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 0.6rem 2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.15s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border: 1px solid #8BC34A;
        }

        .cookie-btn:hover {
            background: #66BB6A;
            transform: scale(1.02);
        }

        .cookie-btn:active {
            background: #2E7D32;
        }

        /* responsive */
        @media (max-width: 700px) {
            .login-card { padding: 1.8rem; }
            .dashboard-header { flex-direction: column; align-items: start; }
            .iframe-container { padding: 1rem; }
            iframe { width: 100%; height: auto; }
            .cookie-banner { flex-direction: column; text-align: center; border-radius: 30px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="appContainer">
        <!-- SECCIÓN LOGIN (visible por defecto) -->
        <div id="loginSection" class="login-section">
            <div class="login-card">
                <h1>red<span>ambiental</span></h1>
                <div class="subhead">
                    Acceso · RAM
                </div>

                <div id="errorBox" class="error-message">
                    ⚠️ Usuario o contraseña incorrectos
                </div>

                <div class="input-group">
                    <label for="username">Usuario maestro</label>
                    <input type="text" id="username" placeholder="ej. RAM25" value="RAM25">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="········">
                </div>

                <button class="btn-login" id="loginBtn">Ingresar al panel</button>

                <div style="margin-top: 2rem; font-size: 0.8rem; color: #A0B8CC; text-align: center; border-top: 1px dashed #C0D4E8; padding-top: 1.5rem;">
                    <span style="background:#E8F0FE; padding:0.2rem 1rem; border-radius:40px">Demo: usuario <strong>RAM25</strong> · contraseña <strong>ram%2026</strong></span>
                </div>
            </div>
        </div>

        <!-- SECCIÓN DASHBOARD (protegida) oculta al inicio -->
        <div id="dashboardSection" class="dashboard-section">
            <div class="dashboard-header">
                <h2>
                    <span style="color:#4CAF50;">⏣</span> Dashboard · Power BI
                </h2>
                <div class="user-badge">
                    <span>👤 RAM25 (Demo)</span>
                    <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
                </div>
            </div>

            <div class="iframe-container">
                <iframe title="D_RAM.v2" width="1024" height="804" src="https://app.powerbi.com/view?r=eyJrIjoiZjNkZDlhYWEtMTJhNS00N2Y3LWJjOTUtYWJmNTI4MmM4MjA3IiwidCI6IjU5ODY5YzBkLWQ0ZDktNGRlZC1hNDg0LTI1YzFhMmU0YTU0MCJ9&embedImagePlaceholder=true" frameborder="0" allowFullScreen="true"></iframe>
            </div>
        </div>
    </div>

    <!-- BANNER DE COOKIES fijo (como en redambiental.com) -->
    <div id="cookieBanner" class="cookie-banner">
        <span>🍪 Este sitio utiliza cookies para mejorar tu experiencia. Al continuar navegando aceptas nuestra política de cookies.</span>
        <button class="cookie-btn" id="acceptCookiesBtn">Aceptar</button>
    </div>

    <script>
        (function() {
            // ---- Credenciales exactas ----
            const MASTER_USER = "RAM25";
            // La contraseña tiene el carácter '%' especial. Se debe comparar tal cual, 
            // pero al escribir en el input el usuario debe poner "ram%2026" (con % real)
            const MASTER_PASS = "ram%2026";  

            // Elementos del DOM
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const errorBox = document.getElementById('errorBox');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            
            // Cookies banner
            const cookieBanner = document.getElementById('cookieBanner');
            const acceptBtn = document.getElementById('acceptCookiesBtn');

            // ----- FUNCIÓN PARA INICIAR SESIÓN -----
            function attemptLogin() {
                const user = usernameInput.value.trim();
                const pass = passwordInput.value;  // respetar tal cual (incluye % si el usuario lo escribe)

                // Verificar credenciales (comparación estricta)
                if (user === MASTER_USER && pass === MASTER_PASS) {
                    // éxito: ocultar error si estaba visible
                    errorBox.classList.remove('show');
                    
                    // cambiar vista: ocultar login, mostrar dashboard
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                    
                    // (Opcional) guardar en sesión para que no se pierda al recargar
                    sessionStorage.setItem('ramAuth', 'true');
                } else {
                    // mostrar mensaje de error
                    errorBox.classList.add('show');
                    // sacudir suavemente el login-card (feedback)
                    const card = document.querySelector('.login-card');
                    card.style.transform = 'shake 0.3s ease';
                    setTimeout(() => card.style.transform = 'none', 300);
                }
            }

            // ----- COMPROBAR SESIÓN AL INICIAR (por si ya estaba autenticado) -----
            function checkSession() {
                if (sessionStorage.getItem('ramAuth') === 'true') {
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';
                } else {
                    loginSection.style.display = 'flex';   // retomar flex del login
                    dashboardSection.style.display = 'none';
                }
            }

            // ----- CERRAR SESIÓN -----
            function logout() {
                sessionStorage.removeItem('ramAuth');
                loginSection.style.display = 'flex';
                dashboardSection.style.display = 'none';
                // limpiar campos? (opcional)
                passwordInput.value = '';
                errorBox.classList.remove('show');
            }

            // ----- EVENTOS -----
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                attemptLogin();
            });

            // Permitir enviar con Enter en los campos
            [usernameInput, passwordInput].forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        loginBtn.click();
                    }
                });
            });

            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });

            // Manejo del banner de cookies
            acceptBtn.addEventListener('click', () => {
                cookieBanner.style.display = 'none';
                // opcional: guardar preferencia en localStorage
                localStorage.setItem('cookiesAccepted', 'true');
            });

            // Si ya aceptó antes, ocultar banner al cargar (para no molestar)
            if (localStorage.getItem('cookiesAccepted') === 'true') {
                cookieBanner.style.display = 'none';
            }

            // Al cargar la página, comprobamos sesión previa
            window.addEventListener('load', function() {
                checkSession();

                // Pequeño detalle: si el usuario RAM25 ya está logueado, aseguramos que el iframe se vea bien
                // (precarga nativa del navegador)
            });

            // Animación shake definida inline (opcional)
            const styleShake = document.createElement('style');
            styleShake.textContent = `
                @keyframes shake {
                    0%,100% { transform: translateX(0); }
                    20% { transform: translateX(-10px); }
                    40% { transform: translateX(10px); }
                    60% { transform: translateX(-5px); }
                    80% { transform: translateX(5px); }
                }
            `;
            document.head.appendChild(styleShake);
          
        })();
    </script>

</body>
</html>
